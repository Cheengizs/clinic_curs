name: clinic_curs

services:
  # 1. PostgreSQL: Основное реляционное хранилище
  postgres:
    image: postgres:16-alpine
    container_name: clinic_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      # При старте создадим базу данных по умолчанию
      POSTGRES_DB: clinic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. MongoDB: Хранилище для EHR и Отзывов
  mongodb:
    image: mongo:7.0
    container_name: clinic_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 3. Redis: In-memory кэш для JWT и расписаний
  redis:
    image: redis:7.2-alpine
    container_name: clinic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 4. RabbitMQ: Брокер сообщений (с плагином management для UI)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: clinic_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rmq_admin
      RABBITMQ_DEFAULT_PASS: rmq_password
    ports:
      - "5672:5672" # Порт для подключения микросервисов
      - "15672:15672" # Порт для Web UI (панель управления)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # 5. Azurite: Эмулятор Azure Blob Storage для файлов
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: clinic_azurite
    ports:
      - "10000:10000" # Blob storage
      - "10001:10001" # Queue storage
      - "10002:10002" # Table storage
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data"
    restart: unless-stopped

# Именованные тома для сохранения данных при перезапуске контейнеров
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  azurite_data:
