name: clinic_curs

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: clinic_postgres
    restart: always
    environment:
      POSTGRES_DB: clinic_db
      POSTGRES_USER: clinic_admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinic_network

  redis_cache:
    image: redis:7-alpine
    container_name: clinic_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - clinic_network

  mongo_logs:
    image: mongo:7.0
    container_name: clinic_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - clinic_network

  azurite_storage:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: clinic_azurite
    restart: always
    ports:
      - "10000:10000" # Blob Service (для файлов: фото, анализы, сканы)
      - "10001:10001" # Queue Service (очереди, если понадобятся для фоновых задач)
      - "10002:10002" # Table Service (таблицы)
    volumes:
      - azurite_data:/data
    networks:
      - clinic_network
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --skipApiVersionCheck"

  mailpit:
    image: axllent/mailpit
    container_name: clinic_mailpit
    restart: always
    ports:
      - "1025:1025" 
      - "8025:8025" 
    networks:
      - clinic_network

networks:
  clinic_network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  azurite_data:
